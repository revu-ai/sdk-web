name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-flight CI run on the same ref when a new commit lands, so a
# rapid push sequence does not pile up redundant workers.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint, types, test, build, size
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run types

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      # The size budget is the contract between the SDK and its hosts:
      # cross it and the "lightweight by design" invariant is broken.
      # Failing CI here is the gate that protects the budget by default.
      - name: Size budget
        run: bun run size
