name: release

# Tag a GitHub Release (e.g. v0.1.0) to ship the corresponding
# `@revu-ai/<package>@<version>` to npm with provenance attestation.
#
# Trigger: a published GitHub Release. The release tag must match the
# package version (e.g. release tag `v0.1.0` requires `packages/core`
# to declare version `0.1.0`). The job fails fast if they disagree.
#
# Prerequisites (one-time setup):
#   - npm "automation" token with publish access to the @revu-ai org,
#     added to this repo as the `NPM_TOKEN` secret.
#   - Repository Actions enabled (already on).
on:
  release:
    types: [published]

# Provenance requires id-token to mint an OIDC token at publish time.
# `contents: write` lets the workflow attach the built CDN artifact to
# the GitHub Release and append SRI hashes to the release body.
permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: build, verify, publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node 20+ is required for `npm publish --provenance`. Bun handles
      # everything else (install, test, build); we only invoke npm for the
      # publish step itself.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Verify the release tag matches the package version. A tag of
      # v0.1.0 and a package.json version of 0.1.0 is the only valid
      # pairing; anything else means the wrong commit was tagged.
      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(node -p "require('./packages/core/package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Release tag v$tag does not match @revu-ai/core version $pkg"
            exit 1
          fi
          echo "Tag and package version match: $pkg"

      # Re-run all CI gates as a final safety net. The same checks ran
      # on push, but tag-time runs against the exact tagged tree, which
      # is the right invariant for "what we publish is what we tested".
      - name: Lint
        run: bun run lint

      # Build before types and test. build wipes dist on entry, so types
      # (emit-declaration-only) must run after it for the .d.ts the published
      # package's `exports.types` points at to survive to publish time. And
      # the IIFE bundle smoke test skips when dist/iife/index.js is absent, so
      # building first is what makes it actually exercise the exact minified
      # bytes this job is about to publish. The publish step below uses
      # `--ignore-scripts` so it ships THIS verified dist as-is rather than
      # letting `prepack` rebuild it after the gates; `prepack` stays in place
      # only as a safety net for a manual `npm publish` outside CI.
      - name: Build
        run: bun run build

      - name: Type check
        run: bun run types

      - name: Test
        run: bun test

      - name: Size budget
        run: bun run size

      # `--provenance` attaches a signed statement linking the published
      # package to this workflow run and commit. The badge appears on the
      # npm package page. `--access public` is required for the first
      # publish of a scoped package; npm scopes default to private.
      # `--ignore-scripts` skips the `prepack` rebuild so we publish exactly
      # the dist the Build / Type check / Test / Size gates above verified -
      # "what we tested is what we publish" - instead of regenerating the
      # bytes after the gates have run.
      - name: Publish @revu-ai/core
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public --ignore-scripts

      # Compute SRI hashes for the published bundles. install.md tells
      # customers "the hash for each release is in the release notes",
      # and the CDN exposes the same hash via the X-Content-Integrity
      # HTTP header; both must agree, so this is the one source of
      # truth. sha384 matches the SRI algorithm the snippet documents.
      - name: Compute SRI hashes
        id: sri
        run: |
          iife_sri="sha384-$(openssl dgst -sha384 -binary packages/core/dist/iife/index.js | openssl base64 -A)"
          esm_sri="sha384-$(openssl dgst -sha384 -binary packages/core/dist/index.js | openssl base64 -A)"
          echo "iife=$iife_sri" >> "$GITHUB_OUTPUT"
          echo "esm=$esm_sri"  >> "$GITHUB_OUTPUT"

      # Pack the IIFE dist tree so the cdn repo operator can download
      # the exact bytes this workflow built and run
      # `bun run publish-asset behavior <version> behavior-<version>`
      # against them, instead of a fresh local build that might drift.
      - name: Pack CDN artifact
        run: |
          version="${GITHUB_REF_NAME#v}"
          tar czf "behavior-${version}.tar.gz" -C packages/core/dist iife

      # Attach the CDN tarball, the individual bundles, and their source
      # maps to the GitHub Release. The tarball is the CDN handoff; the
      # loose files are there for spot-checking and SRI verification.
      - name: Attach build artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release upload "$GITHUB_REF_NAME" \
            "behavior-${version}.tar.gz" \
            packages/core/dist/iife/index.js \
            packages/core/dist/iife/index.js.map \
            packages/core/dist/index.js \
            packages/core/dist/index.js.map \
            --clobber

      # Append the SRI block to the release body, preserving whatever
      # the human wrote. Satisfies the contract in install.md that the
      # hash for each release lives in the release notes.
      - name: Append SRI hashes to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          iife_sri="${{ steps.sri.outputs.iife }}"
          esm_sri="${{ steps.sri.outputs.esm }}"
          current=$(gh release view "$GITHUB_REF_NAME" --json body --jq .body)
          {
            printf '%s\n\n' "$current"
            echo "## Integrity"
            echo ""
            echo "Pin the script tag with \`integrity\` when loading from the CDN:"
            echo ""
            echo "- IIFE (\`https://cdn.revu.ai/behavior/${version}/index.js\`): \`${iife_sri}\`"
            echo "- ESM bundle (\`@revu-ai/core@${version}\`): \`${esm_sri}\`"
          } > combined.md
          gh release edit "$GITHUB_REF_NAME" --notes-file combined.md
